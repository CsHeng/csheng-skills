version = 2

[workflow]
id = "implement-change"
role = "controller"
entry_phase = "implement-serial"

[[nodes]]
id = "implement-change"
role = "controller"
owns_repair_loop = true

[[nodes]]
id = "review-change"
role = "gate"

[[nodes]]
id = "review-implementation"
role = "evaluator"

[[nodes]]
id = "sync-truth"
role = "gate"

[[nodes]]
id = "close-change"
role = "gate"

[[edges]]
from = "implement-change"
to = "review-change"

[[edges]]
from = "review-change"
to = "review-implementation"

[[edges]]
from = "implement-change"
to = "sync-truth"

[[edges]]
from = "implement-change"
to = "close-change"

[[forbidden_edges]]
from = "review-implementation"
to = "implement-change"

[[forbidden_edges]]
from = "review-implementation"
to = "review-change"

[[forbidden_edges]]
from = "review-implementation"
to = "review-implementation"

[[forbidden_edges]]
from = "review-change"
to = "implement-change"

[review]
preferred_actor = "subagent"
fallback_actor = "main"
delegated_recursion = false
requires_bounded_brief = true
candidate_findings_only = true
adjudication_owner = "implement-change"

[repair]
owner = "implement-change"
initial_review_passes = 1
focused_verification_passes = 1
additional_same_slice_repair_attempts = 1
states = ["implement", "verify", "review", "classify", "diagnose", "repair"]
typed_exits = ["pass", "replan", "redesign", "needs-authority", "rollback", "non-convergent"]
